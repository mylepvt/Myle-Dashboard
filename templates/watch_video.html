<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% if title %}{{ title }}{% else %}Video{% endif %} — Myle</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
</head>
<body class="bg-light min-vh-100 d-flex align-items-center justify-content-center p-3">
  <div class="card border-0 shadow-sm text-center" style="max-width: 420px;">
    <div class="card-body p-4">
      {% if error %}
      <i class="bi bi-link-45deg text-muted" style="font-size: 3rem;"></i>
      <h5 class="mt-3">Link not found or expired</h5>
      <p class="text-muted small mb-0">This share link is invalid or has expired.</p>
      {% else %}
      <i class="bi bi-play-circle text-primary" style="font-size: 3rem;"></i>
      <h5 class="mt-3">{{ title }}</h5>
      <p class="text-muted small mb-0">Thanks for watching. Your response has been recorded.</p>
      {% endif %}
    </div>
  </div>
</body>
</html>
