# GitHub Pages — only serves `github-pages-static/` (placeholder).
# The Flask dashboard must run on Render (or similar), not Pages.
#
# If an OLD workflow still fails: delete it from .github/workflows/
# (e.g. jekyll-gh-pages.yml / pages-build-deployment from GitHub UI).
name: pages build and deployment

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: github-pages-static
      - id: deployment
        uses: actions/deploy-pages@v4
