<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Myle Review System{% endblock %}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    body { background: #f5f6fa; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .navbar-brand { font-weight: 700; letter-spacing: -.5px; }
    .card { border-radius: 14px; border: none; }
    .badge-prediction { font-size: .78rem; padding: 5px 10px; border-radius: 20px; }
    .pred-will_buy       { background: #d1fae5; color: #065f46; }
    .pred-needs_push     { background: #fef3c7; color: #92400e; }
    .pred-will_delay     { background: #dbeafe; color: #1e40af; }
    .pred-will_not_buy   { background: #fee2e2; color: #991b1b; }
    .analysis-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    @media (max-width: 576px) { .analysis-grid { grid-template-columns: 1fr; } }
    .analysis-item { background: #fff; border-radius: 10px; padding: 12px 14px; box-shadow: 0 1px 4px rgba(0,0,0,.06); }
    .analysis-label { font-size: .7rem; color: #6b7280; font-weight: 600; text-transform: uppercase; letter-spacing: .4px; margin-bottom: 3px; }
    .analysis-value { font-size: .9rem; font-weight: 600; color: #111827; }
    .analysis-full { background: #fff; border-radius: 10px; padding: 14px; box-shadow: 0 1px 4px rgba(0,0,0,.06); }
    .analysis-full .analysis-label { margin-bottom: 4px; }
    .analysis-full .analysis-value { font-size: .88rem; font-weight: 400; color: #374151; line-height: 1.5; }
    .level-bar { height: 6px; border-radius: 3px; background: #e5e7eb; margin-top: 6px; }
    .level-fill { height: 100%; border-radius: 3px; background: #6366f1; }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark px-3 mb-4">
  <a class="navbar-brand" href="/">
    <i class="bi bi-clipboard2-pulse me-2 text-warning"></i>Myle Review
  </a>
  <div class="ms-auto d-flex gap-2">
    <a href="/analyze" class="btn btn-warning btn-sm fw-semibold">
      <i class="bi bi-plus-circle me-1"></i>New Analysis
    </a>
    <a href="/settings" class="btn btn-outline-light btn-sm">
      <i class="bi bi-gear"></i>
    </a>
  </div>
</nav>

<div class="container" style="max-width:720px;">
  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
